name: style_consultant
description: AI Style Consultant - your personal fashion AI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.2
  dio: ^5.7.0

  # Location
  geolocator: ^14.0.2

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Storage
  shared_preferences: ^2.3.3

  # UI
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  lottie: ^3.1.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  path_provider: ^2.1.4
  mime: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
